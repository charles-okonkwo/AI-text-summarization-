<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <button class="new-chat-btn" id="newChatBtn" title="New conversation">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"></path>
                    </svg>
                    New Chat
                </button>
            </div>

            <div class="sidebar-content">
                <h3 class="sidebar-section-title">History</h3>
                <div class="history-list" id="historyList">
                    <p class="empty-state">No history yet</p>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="settings-btn" title="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="1"></circle>
                        <circle cx="19" cy="12" r="1"></circle>
                        <circle cx="5" cy="12" r="1"></circle>
                    </svg>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-container">
            <div class="chat-wrapper">
                <!-- Toggle sidebar button (mobile) -->
                <button class="mobile-sidebar-toggle" id="mobileSidebarToggle" title="Open sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>

                <!-- Chat Messages -->
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-section">
                        <h1>Text Summarizer</h1>
                        <p>Paste any text and get an AI-powered summary instantly</p>
                    </div>
                </div>

                <!-- Loading Indicator -->
                <div class="loading-indicator" id="loading">
                    <div class="spinner"></div>
                    <p>Summarizing...</p>
                </div>
            </div>

            <!-- Floating Input Area -->
            <div class="input-container">
                <!-- Text Input Mode -->
                <div class="input-mode" id="textMode">
                    <!-- Pill-Style Input Bar -->
                    <div class="input-pill-container">
                        <!-- Attachment Chip -->
                        <div class="attachment-chip" id="attachmentChip" style="display: none;">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                            </svg>
                            <span class="attachment-name" id="attachmentName"></span>
                            <button class="attachment-remove" id="attachmentRemoveBtn" onclick="removeAttachment()" type="button">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>

                        <!-- Input Row (Textarea + Icons) -->
                        <div class="input-pill-row">
                            <!-- Textarea Input -->
                            <textarea
                                id="userInput"
                                class="input-textarea"
                                placeholder="Type your message or paste text..."
                                rows="1"
                            ></textarea>

                            <!-- Fast Badge -->
                            <div class="fast-badge">Fast</div>

                            <!-- Action Icons -->
                            <div class="input-actions">
                                <!-- Microphone Icon -->
                                <button class="action-icon mic-btn" id="micBtn" title="Speak to input text" onclick="toggleMicrophone()">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M12 1a3 3 0 0 0-3 3v12a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                        <line x1="12" y1="19" x2="12" y2="23"></line>
                                        <line x1="8" y1="23" x2="16" y2="23"></line>
                                    </svg>
                                </button>

                                <!-- Language/Translate Icon -->
                                <div class="language-dropdown-wrapper">
                                    <button class="action-icon lang-btn" id="langBtn" title="Select language for translation">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <circle cx="12" cy="12" r="10"></circle>
                                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                                            <path d="M2 12h20"></path>
                                        </svg>
                                    </button>
                                    <select id="languageSelect" class="language-select-inline" title="Select target language for translation">
                                        <option value="">No Translation</option>
                                        <optgroup label="European">
                                            <option value="es">Spanish</option>
                                            <option value="fr">French</option>
                                            <option value="de">German</option>
                                            <option value="it">Italian</option>
                                            <option value="pt">Portuguese</option>
                                            <option value="nl">Dutch</option>
                                            <option value="pl">Polish</option>
                                            <option value="ru">Russian</option>
                                        </optgroup>
                                        <optgroup label="Asian">
                                            <option value="zh">Chinese (Simplified)</option>
                                            <option value="zh-TW">Chinese (Traditional)</option>
                                            <option value="ja">Japanese</option>
                                            <option value="ko">Korean</option>
                                            <option value="hi">Hindi</option>
                                            <option value="th">Thai</option>
                                            <option value="vi">Vietnamese</option>
                                        </optgroup>
                                        <optgroup label="Middle East & Africa">
                                            <option value="ar">Arabic</option>
                                            <option value="tr">Turkish</option>
                                            <option value="he">Hebrew</option>
                                            <option value="fa">Persian</option>
                                        </optgroup>
                                        <optgroup label="Other">
                                            <option value="sv">Swedish</option>
                                            <option value="da">Danish</option>
                                            <option value="no">Norwegian</option>
                                            <option value="cs">Czech</option>
                                            <option value="hu">Hungarian</option>
                                            <option value="el">Greek</option>
                                        </optgroup>
                                    </select>
                                </div>

                                <!-- Plus Icon for PDF Upload -->
                                <button class="action-icon add-btn" id="addBtn" title="Attach file (PDF)" onclick="triggerPdfUpload()">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="12" y1="5" x2="12" y2="19"></line>
                                        <line x1="5" y1="12" x2="19" y2="12"></line>
                                    </svg>
                                </button>

                                <!-- Send Button -->
                                <button class="send-btn-icon" id="sendBtn" title="Send message">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="22" y1="2" x2="11" y2="13"></line>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- PDF Upload Mode (Modal Overlay) -->
                <div class="pdf-modal-backdrop" id="pdfMode" style="display: none;">
                    <div class="pdf-modal-container">
                        <!-- Close Button -->
                        <button class="pdf-close-btn" id="pdfCloseBtn" title="Close PDF upload" onclick="closePdfUpload()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>

                        <div class="pdf-upload-area" id="pdfUploadArea">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                <path d="M12 9v6M9 12h6"></path>
                            </svg>
                            <h3>Upload PDF to Summarize</h3>
                            <p>Drag and drop your PDF here or click to browse</p>
                            <input type="file" id="pdfInput" accept=".pdf" style="display: none;">
                        </div>
                        <div id="pdfPreview" style="display: none;">
                            <p class="pdf-file-name" id="pdfFileName"></p>
                            <div class="pdf-instruction-wrapper">
                                <textarea
                                    id="pdfInstruction"
                                    placeholder="Add instructions (e.g., 'Summarize in bullet points', 'Focus on key findings', etc.)"
                                    rows="3"
                                ></textarea>
                                <button class="send-btn" id="sendPdfBtn" title="Summarize PDF">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="22" y1="2" x2="11" y2="13"></line>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <p class="input-hint">Maximum file size: 50MB</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
