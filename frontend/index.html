<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Summarizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <button class="new-chat-btn" id="newChatBtn" title="New conversation">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"></path>
                    </svg>
                    New Chat
                </button>
            </div>

            <div class="sidebar-content">
                <h3 class="sidebar-section-title">History</h3>
                <div class="history-list" id="historyList">
                    <p class="empty-state">No history yet</p>
                </div>
            </div>

            <div class="sidebar-footer">
                <button class="settings-btn" title="Settings">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="1"></circle>
                        <circle cx="19" cy="12" r="1"></circle>
                        <circle cx="5" cy="12" r="1"></circle>
                    </svg>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="main-container">
            <div class="chat-wrapper">
                <!-- Toggle sidebar button (mobile) -->
                <button class="mobile-sidebar-toggle" id="mobileSidebarToggle" title="Open sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>

                <!-- Chat Messages -->
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-section">
                        <h1>Text Summarizer</h1>
                        <p>Paste any text and get an AI-powered summary instantly</p>
                    </div>
                </div>

                <!-- Loading Indicator -->
                <div class="loading-indicator" id="loading">
                    <div class="spinner"></div>
                    <p>Summarizing...</p>
                </div>
            </div>

            <!-- Floating Input Area -->
            <div class="input-container">
                <!-- Input Mode Tabs -->
                <div class="input-tabs">
                    <button class="input-tab active" data-mode="text" title="Text input mode">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        Text
                    </button>
                    <button class="input-tab" data-mode="pdf" title="PDF upload mode">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                        PDF
                    </button>
                </div>

                <!-- Text Input Mode -->
                <div class="input-mode" id="textMode">
                    <div class="input-wrapper">
                        <textarea
                            id="userInput"
                            class="message-input"
                            placeholder="Paste your text here or click the mic to speak..."
                            rows="1"
                        ></textarea>
                        <button class="mic-btn" id="micBtn" title="Speak to input text" onclick="toggleMicrophone()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 1a3 3 0 0 0-3 3v12a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                <line x1="12" y1="19" x2="12" y2="23"></line>
                                <line x1="8" y1="23" x2="16" y2="23"></line>
                            </svg>
                        </button>
                        <button class="send-btn" id="sendBtn" title="Send message">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    <p class="input-hint">Type or paste text to summarize</p>
                </div>

                <!-- PDF Upload Mode -->
                <div class="input-mode" id="pdfMode" style="display: none;">
                    <div class="pdf-upload-area" id="pdfUploadArea">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                            <path d="M12 9v6M9 12h6"></path>
                        </svg>
                        <h3>Upload PDF to Summarize</h3>
                        <p>Drag and drop your PDF here or click to browse</p>
                        <input type="file" id="pdfInput" accept=".pdf" style="display: none;">
                    </div>
                    <div id="pdfPreview" style="display: none;">
                        <p class="pdf-file-name" id="pdfFileName"></p>
                        <div class="pdf-instruction-wrapper">
                            <textarea
                                id="pdfInstruction"
                                placeholder="Add instructions (e.g., 'Summarize in bullet points', 'Focus on key findings', etc.)"
                                rows="3"
                            ></textarea>
                            <button class="send-btn" id="sendPdfBtn" title="Summarize PDF">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="22" y1="2" x2="11" y2="13"></line>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <p class="input-hint">Maximum file size: 50MB</p>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
